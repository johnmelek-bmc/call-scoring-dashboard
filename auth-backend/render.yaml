# ============================================================
# Render Blueprint — Call Scoring Auth Backend
# ============================================================
# Backend autonome : stockage local (users.json), aucun accès GitHub.
# Déployer depuis le REPO PUBLIC (johnmelek-bmc/call-scoring-dashboard)
# pour ne donner aucun accès au repo privé.
# ============================================================

services:
  - type: web
    name: call-scoring-auth
    env: node
    region: frankfurt
    plan: free
    rootDir: auth-backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"

      # --- RESEND API (envoi d'emails par HTTP — pas de SMTP) ---
      - key: RESEND_API_KEY
        sync: false  # ⬅️ À remplir dans le dashboard Render

      
      # --- PIPELINE API KEY (mettre la même valeur dans GitHub Secrets) ---
      - key: DATA_API_KEY
        sync: false  # ⬅️ À remplir dans le dashboard Render

      # --- CORS ---
      - key: ALLOWED_ORIGINS
        value: "https://johnmelek-bmc.github.io"

      # --- JWT (auto-généré si vide) ---
      - key: JWT_SECRET
        generateValue: true
