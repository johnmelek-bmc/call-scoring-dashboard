<style>
/* ============================================================
   DESIGN SYSTEM — Apple-inspired
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');

/* ---- Login Screen ---- */
.login-overlay { display: flex; position: fixed; inset: 0; background: var(--bg); z-index: 9999; justify-content: center; align-items: center; }
.login-overlay.hidden { display: none; }
.login-card { background: var(--surface); border-radius: var(--radius-xl); padding: 48px 40px 40px; width: 100%; max-width: 420px; box-shadow: var(--shadow-xl); border: 1px solid var(--border); text-align: center; }
.login-card h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
.login-card p.sub { font-size: 13px; color: var(--text-tertiary); margin-bottom: 28px; }
.login-card .form-group { margin-bottom: 16px; text-align: left; }
.login-card label { display: block; font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
.login-card input { width: 100%; padding: 10px 14px; border-radius: var(--radius); border: 1px solid var(--border); font-size: 15px; font-family: var(--font); outline: none; transition: var(--transition); background: var(--surface-secondary); }
.login-card input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,113,227,0.15); background: var(--surface); }
.login-card .btn-primary { width: 100%; padding: 10px; border-radius: var(--radius); border: none; background: var(--blue); color: var(--text-inverse); font-size: 14px; font-weight: 600; cursor: pointer; transition: var(--transition); font-family: var(--font); }
.login-card .btn-primary:hover { background: var(--blue-hover); }
.login-card .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.login-card .error-msg { font-size: 12px; color: var(--red-dim); margin-top: 8px; min-height: 20px; }
.login-card .info-msg { font-size: 11px; color: var(--text-tertiary); margin-top: 16px; line-height: 1.5; }
.login-card .domain-hint { font-size: 11px; color: var(--blue); margin-top: 4px; }

:root {
  --bg: #f5f5f7;
  --bg-alt: #ffffff;
  --surface: #ffffff;
  --surface-secondary: #f5f5f7;
  --border: rgba(0,0,0,0.06);
  --border-hover: rgba(0,0,0,0.10);
  --text-primary: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-tertiary: #86868b;
  --text-inverse: #ffffff;
  --blue: #0071e3;
  --blue-dim: #5ac8fa;
  --green: #30d158;
  --green-dim: #34c759;
  --orange: #ff9f0a;
  --red: #ff453a;
  --red-dim: #ff3b30;
  --purple: #bf5af2;
  --teal: #64d2ff;
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow: 0 2px 8px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.03);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.08), 0 4px 8px rgba(0,0,0,0.04);
  --shadow-xl: 0 20px 60px rgba(0,0,0,0.12), 0 8px 20px rgba(0,0,0,0.06);
  --transition: 250ms cubic-bezier(0.22, 1, 0.36, 1);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  --font-mono: 'SF Mono', 'SFMono-Regular', 'ui-monospace', 'Menlo', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }
body { font-family: var(--font); background: var(--bg); color: var(--text-primary); min-height: 100vh; line-height: 1.5; }

/* ---- Sidebar ---- */
.sidebar-btn { font-size: 12px; font-weight: 500; padding: 8px 12px; border-radius: 6px; margin-bottom: 2px; }
.sidebar-btn .icon { display: none; }
.sidebar-btn:hover { background: rgba(0,113,227,0.08); color: var(--blue); }
.sidebar-btn.active { background: var(--blue); color: #fff; font-weight: 600; box-shadow: 0 2px 8px rgba(0,113,227,0.3); }
.app { display: flex; min-height: 100vh; }
.sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; position: sticky; top: 0; height: 100vh; z-index: 100; }
.sidebar-brand { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
.sidebar-brand h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; color: var(--text-primary); }
.sidebar-brand span { font-size: 10px; font-weight: 500; color: var(--text-tertiary); letter-spacing: 0.03em; text-transform: uppercase; display: block; margin-top: 2px; }
.sidebar-scroll { padding: 8px 8px; flex: 1; overflow-y: auto; }
.nav-label { font-size: 10px; font-weight: 600; color: var(--text-tertiary); letter-spacing: 0.05em; text-transform: uppercase; padding: 16px 10px 6px; }
.sidebar-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 7px 10px; border-radius: var(--radius-sm); border: none; background: transparent; color: var(--text-secondary); font-size: 13px; font-weight: 500; cursor: pointer; transition: var(--transition); text-align: left; }
.sidebar-btn:hover { background: var(--surface-secondary); color: var(--text-primary); }
.sidebar-btn.active { background: var(--blue); color: var(--text-inverse); font-weight: 600; }
.sidebar-btn .icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
.sidebar-divider { height: 1px; background: var(--border); margin: 8px 10px; }
.data-badge { font-size: 10px; color: var(--text-tertiary); padding: 10px 16px; border-top: 1px solid var(--border); text-align: left; }

/* ---- Main ---- */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

/* ---- Top Bar ---- */
.topbar { background: rgba(255,255,255,0.80); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 12px 28px; display: flex; align-items: center; justify-content: space-between; gap: 12px; position: sticky; top: 0; z-index: 50; }
.topbar-title { font-size: 16px; font-weight: 500; letter-spacing: -0.01em; }
.topbar-title strong { font-weight: 700; }
.topbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.period-group { display: flex; gap: 0; background: var(--surface-secondary); border-radius: var(--radius-sm); padding: 2px; }
.period-btn { padding: 4px 10px; border: none; background: transparent; font-size: 11px; font-weight: 500; color: var(--text-secondary); cursor: pointer; border-radius: 4px; transition: var(--transition); font-family: var(--font); }
.period-btn:hover { color: var(--text-primary); }
.period-btn.active { background: var(--surface); color: var(--text-primary); box-shadow: var(--shadow-sm); }
.filter-select { appearance: none; -webkit-appearance: none; padding: 4px 24px 4px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface) url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236e6e73' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 6px center; font-size: 11px; font-weight: 500; color: var(--text-secondary); cursor: pointer; outline: none; font-family: var(--font); }
.filter-select:hover { border-color: var(--border-hover); }

/* ---- Content ---- */
.content { padding: 20px 28px; display: flex; flex-direction: column; gap: 16px; max-width: 1400px; margin: 0 auto; width: 100%; }

/* ---- KPI Cards ---- */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px; }
.kpi-card { background: var(--surface); border-radius: var(--radius-lg); padding: 16px 18px; border: 1px solid var(--border); transition: var(--transition); position: relative; overflow: hidden; }
.kpi-card:hover { box-shadow: var(--shadow-md); border-color: var(--border-hover); }
.kpi-card .kpi-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.kpi-bar.blue { background: var(--blue); }
.kpi-bar.green { background: var(--green-dim); }
.kpi-bar.orange { background: var(--orange); }
.kpi-bar.red { background: var(--red-dim); }
.kpi-bar.purple { background: var(--purple); }
.kpi-label { font-size: 10px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
.kpi-value { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.15; }
.kpi-value .unit { font-size: 14px; font-weight: 500; color: var(--text-tertiary); }
.kpi-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; font-weight: 400; }
.kpi-blue .kpi-value { color: var(--blue); }
.kpi-green .kpi-value { color: var(--green-dim); }
.kpi-orange .kpi-value { color: var(--orange); }
.kpi-red .kpi-value { color: var(--red-dim); }
.kpi-purple .kpi-value { color: var(--purple); }

/* ---- Charts ---- */
.charts-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
@media (max-width: 1100px) { .charts-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 700px) { .charts-grid { grid-template-columns: 1fr; } }
.chart-card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 16px 20px; box-shadow: var(--shadow-sm); }
.chart-card h3 { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 12px; letter-spacing: -0.01em; }
.chart-wrap { position: relative; width: 100%; display: flex; justify-content: center; }
.chart-wrap canvas { display: block; width: 100% !important; max-width: 100%; max-height: 180px; }

/* ---- Table ---- */
.table-card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden; }
.table-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; border-bottom: 1px solid var(--border); }
.table-header h3 { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
.table-header .count { font-size: 11px; color: var(--text-tertiary); }
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th { padding: 8px 14px; font-size: 9px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; text-align: left; border-bottom: 1px solid var(--border); background: var(--surface-secondary); white-space: nowrap; user-select: none; }
tbody td { padding: 8px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr { transition: background 150ms; }
tbody tr:hover { background: var(--surface-secondary); }
.agent-link { color: var(--blue); font-weight: 600; cursor: pointer; background: none; border: none; font-size: 12px; padding: 0; text-decoration: none; font-family: var(--font); }
.agent-link:hover { text-decoration: underline; }

/* Grade badges */
.grade-badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; }
.grade-A { background: rgba(48,209,88,0.12); color: #248a3d; }
.grade-B { background: rgba(255,159,10,0.12); color: #b87800; }
.grade-C { background: rgba(255,69,58,0.10); color: #bf2a1f; }

/* Sentiment bar */
.sentiment-bar { display: flex; width: 80px; height: 5px; border-radius: 3px; overflow: hidden; background: var(--border); }
.sentiment-bar div { height: 100%; transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1); }

/* ---- Modal ---- */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 999; justify-content: center; align-items: flex-start; padding: 40px 20px; overflow-y: auto; }
.modal-overlay.active { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius-xl); width: 100%; max-width: 820px; margin: auto; box-shadow: var(--shadow-xl); overflow: hidden; }
.modal-header { padding: 22px 28px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.modal-header h2 { font-size: 19px; font-weight: 700; letter-spacing: -0.02em; }
.modal-header .meta { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
.modal-close { background: var(--surface-secondary); border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 14px; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); flex-shrink: 0; }
.modal-close:hover { background: var(--border); }
.modal-body { padding: 18px 28px 24px; max-height: 70vh; overflow-y: auto; }

/* Agent stats in modal */
.agent-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
.stat-pill { text-align: center; background: var(--surface-secondary); border-radius: var(--radius); padding: 10px 6px; }
.stat-pill .num { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
.stat-pill .lbl { font-size: 9px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.03em; margin-top: 1px; }

/* Grille evaluation in modal */
.grille-section { margin-bottom: 16px; }
.grille-section h4 { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
.grille-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: var(--radius-sm); background: var(--surface-secondary); margin-bottom: 4px; border-left: 3px solid var(--border); }
.grille-row.conforme { border-left-color: var(--green-dim); }
.grille-row.ameliorer { border-left-color: var(--orange); }
.grille-row.non-conforme { border-left-color: var(--red-dim); }
.grille-row.na { border-left-color: var(--border); opacity: 0.6; }
.grille-label { flex: 1; font-size: 12px; font-weight: 500; color: var(--text-primary); }
.grille-level { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 8px; white-space: nowrap; }
.gl-conforme { background: rgba(48,209,88,0.12); color: #248a3d; }
.gl-ameliorer { background: rgba(255,159,10,0.12); color: #b87800; }
.gl-nonconforme { background: rgba(255,69,58,0.10); color: #bf2a1f; }
.gl-na { background: var(--border); color: var(--text-tertiary); }
.grille-points { font-size: 11px; color: var(--text-secondary); font-weight: 500; white-space: nowrap; }
.grille-pct { font-size: 11px; color: var(--text-secondary); min-width: 40px; text-align: right; font-variant-numeric: tabular-nums; }

/* Points forts/faibles */
.notes-section { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 14px 0; }
.notes-box { border-radius: var(--radius); padding: 12px 14px; }
.notes-box h5 { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
.notes-box ul { list-style: none; padding: 0; }
.notes-box li { font-size: 11px; padding: 2px 0; line-height: 1.5; }
.notes-pro { background: rgba(48,209,88,0.06); border: 1px solid rgba(48,209,88,0.15); }
.notes-pro h5 { color: #248a3d; }
.notes-con { background: rgba(255,69,58,0.05); border: 1px solid rgba(255,69,58,0.12); }
.notes-con h5 { color: #bf2a1f; }
.notes-amelio { background: rgba(255,159,10,0.06); border: 1px solid rgba(255,159,10,0.15); }
.notes-amelio h5 { color: #b87800; }

/* Breakdown bar */
.breakdown-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; margin: 10px 0; background: var(--border); }
.breakdown-bar .seg-conforme { background: var(--green-dim); }
.breakdown-bar .seg-ameliorer { background: var(--orange); }
.breakdown-bar .seg-nonconforme { background: var(--red-dim); }
.breakdown-bar .seg-na { background: var(--border); }

/* Call timeline in modal */
.call-entry { background: var(--surface-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 6px; transition: var(--transition); }
.call-entry:hover { border-color: var(--border-hover); }
.call-entry-top { display: flex; justify-content: space-between; align-items: center; gap: 6px; margin-bottom: 4px; }
.call-entry-date { font-size: 11px; color: var(--text-tertiary); }
.call-entry-grade { font-size: 13px; font-weight: 700; letter-spacing: -0.01em; }
.call-entry-detail { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }

/* ---- Empty & Loading ---- */
.empty-state { text-align: center; padding: 50px 20px; }
.empty-state h3 { font-size: 15px; font-weight: 600; color: var(--text-secondary); margin-bottom: 3px; }
.empty-state p { font-size: 12px; color: var(--text-tertiary); }
.loading { display: flex; justify-content: center; align-items: center; padding: 70px; gap: 10px; color: var(--text-tertiary); font-size: 13px; }
.spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

/* ---- Responsive ---- */
@media (max-width: 768px) {
  .sidebar { width: 48px; }
  .sidebar-brand h1, .sidebar-brand span, .nav-label, .sidebar-btn span { display: none; }
  .sidebar-btn { justify-content: center; padding: 6px; }
  .sidebar-btn .icon { margin: 0; }
  .topbar { padding: 10px 14px; flex-wrap: wrap; }
  .topbar-title { font-size: 14px; }
  .content { padding: 12px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .kpi-value { font-size: 20px; }
  .notes-section { grid-template-columns: 1fr; }
  .agent-stats { grid-template-columns: repeat(2, 1fr); }
  .modal { max-width: 100%; margin: 8px; border-radius: var(--radius-lg); }
}
</style>
</head>

    </div>
    <button class="btn-primary" id="loginBtn">Se connecter</button>
    <div class="error-msg" id="loginError"></div>
    <div class="info-msg">Authentification par passphrase d'équipe.<br>Session active 2 heures.</div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div><h2 id="modalName"></h2><div class="meta" id="modalMeta"></div></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let DATA = {};
let SVC = 'E-vendeurs';
let PERIOD = 'all';
let MONTH = new Date().getMonth();
let YEAR = new Date().getFullYear();
let CHARTS = {};

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  // Populate month select
  const ms = document.getElementById('monthSel');
  const months = 'Janvier Février Mars Avril Mai Juin Juillet Août Septembre Octobre Novembre Décembre'.split(' ');
  months.forEach((m,i) => { const o=document.createElement('option'); o.value=i; o.textContent=m; if(i===MONTH)o.selected=true; ms.appendChild(o); });

  // Populate year select
  const ys = document.getElementById('yearSel');
  const cy = new Date().getFullYear();
  for(let y=cy+1; y>=cy-2; y--) { const o=document.createElement('option'); o.value=y; o.textContent=y; if(y===cy)o.selected=true; ys.appendChild(o); }

  // Sidebar buttons
  document.querySelectorAll('[data-svc]').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('[data-svc]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    SVC = b.dataset.svc;
    render();
  }));

  // Period buttons
  document.querySelectorAll('[data-p]').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('[data-p]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    PERIOD = b.dataset.p;
    render();
  }));

  document.getElementById('monthSel').addEventListener('change', e => { MONTH = +e.target.value; render(); });
  document.getElementById('yearSel').addEventListener('change', e => { YEAR = +e.target.value; render(); });

  // Modal backdrop close
  document.getElementById('modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
  document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

  load();
});

async function load() {
  try {
    const r = await fetch('data.json?' + Date.now());
    if (!r.ok) throw new Error(String(r.status));
    DATA = normalizeAllData(await r.json());
    const dates = Object.keys(DATA).sort();
    const total = dates.reduce((s,d) => s + DATA[d].length, 0);
    const last = dates[dates.length-1] || '—';
    document.getElementById('dataBadge').textContent = total + ' appels · ' + last;
  } catch(e) {
    console.warn('Load error:', e);
    DATA = {};
    document.getElementById('dataBadge').textContent = 'Données indisponibles';
  }
  render();
}

// ============================================================
// NORMALIZE & DATA HELPERS
// ============================================================
function normalizeCall(c) {
  // Ensure pros/cons are arrays (old format had strings)
  if (c.pros && typeof c.pros === 'string') c.pros = c.pros.split(';').map(s => s.trim()).filter(Boolean);
  if (c.cons && typeof c.cons === 'string') c.cons = c.cons.split(';').map(s => s.trim()).filter(Boolean);
  if (c.a_ameliorer && typeof c.a_ameliorer === 'string') c.a_ameliorer = c.a_ameliorer.split(';').map(s => s.trim()).filter(Boolean);
  if (!Array.isArray(c.pros)) c.pros = [];
  if (!Array.isArray(c.cons)) c.cons = [];
  if (!Array.isArray(c.a_ameliorer)) c.a_ameliorer = [];
  return c;
}

function normalizeAllData(data) {
  Object.keys(data).forEach(dk => {
    data[dk] = data[dk].map(normalizeCall);
  });
  return data;
}

// ============================================================
// PDF EXPORT
// ============================================================
function exportPDF() {
  if (!window.print) return;
  // Inject print-specific styles
  const style = document.createElement('style');
  style.textContent = `
    @media print {
      .sidebar, .topbar, .topbar-right button:last-child { display: none !important; }
      .content { padding: 0 !important; max-width: 100% !important; }
      .kpi-card { break-inside: avoid; }
      .chart-card { break-inside: avoid; page-break-inside: avoid; }
      .table-scroll { overflow: visible !important; }
      table { font-size: 10px; }
      .modal-overlay { display: none !important; }
      .login-overlay { display: none !important; }
    }`;
  document.head.appendChild(style);
  window.print();
  document.head.removeChild(style);
}

// ============================================================
// FILTER
// ============================================================
function getCalls() {
  const min = PERIOD === 'all' ? null :
    PERIOD === 'month' ? new Date(YEAR, MONTH, 1) :
    new Date(YEAR, MONTH-2, 1);
  const max = PERIOD === 'all' ? null : new Date(YEAR, MONTH+1, 0, 23, 59, 59);
  const out = [];
  Object.keys(DATA).forEach(dk => {
    const d = new Date(dk+'T00:00:00');
    if (min && d < min) return;
    if (max && d > max) return;
    // Day-of-week filtering: Mon-Fri (1-5) for all, Sat (6) only for Qualifieurs & E-vendeurs
    const dow = d.getDay(); // 0=Sun, 1=Mon, ..., 6=Sat
    (DATA[dk]||[]).forEach(c => {
      if (SVC !== '__all__' && c.service !== SVC) return;
      // Skip Sunday (0) for all services
      if (dow === 0) return;
      // Skip Saturday (6) for non-qualif/e-vente services
      if (dow === 6 && SVC !== 'Qualifieurs' && SVC !== 'E-vendeurs' && SVC !== '__all__') return;
      if (dow === 6 && SVC === '__all__' && c.service !== 'Qualifieurs' && c.service !== 'E-vendeurs') return;
      out.push(c);
    });
  });
  return out;
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const calls = getCalls();
  const label = SVC === '__all__' ? 'Vue d\'ensemble' : SVC;
  document.getElementById('pageTitle').innerHTML = 'Service : <strong>' + esc(label) + '</strong>';
  document.getElementById('contentArea').innerHTML = buildKPI(calls) + buildCharts(calls) + buildTable(calls);
  if (calls.length) requestAnimationFrame(() => initCharts(calls));
}

// ---- KPI ----
function buildKPI(calls) {
  if (!calls.length) {
    return `<div class="kpi-grid">${[['Appels','0',''],['Note moyenne','—','%'],['Conformité','—',''],['Agents','0',''],['Satisfaction','—','%']].map(([l,v,u])=>`<div class="kpi-card kpi-neutral"><div class="kpi-bar blue"></div><div class="kpi-label">${l}</div><div class="kpi-value">${v}${u?`<span class="unit">${u}</span>`:''}</div></div>`).join('')}</div><div class="empty-state"><h3>Aucun appel pour cette période</h3><p>Ajustez les filtres pour visualiser les données.</p></div>`;
  }
  let sumPct = 0, sumSat = 0, sumFric = 0, sumDur = 0, sumConf = 0;
  const ag = new Set();
  calls.forEach(c => {
    const pct = c.score || 0;
    sumPct += pct;
    const sat = c.client_sentiment;
    if (sat) { sumSat += sat.Satisfied||0; sumFric += sat.Frustrated||0; }
    if (c.agent_name) ag.add(c.agent_name);
    sumDur += c.duration_sec || 0;
    if (c.grade_label === 'Conforme') sumConf++;
  });
  const n = calls.length;
  const avg = (sumPct / n).toFixed(1);
  const sat = Math.round(sumSat / n);
  const fric = Math.round(sumFric / n);
  const conformite = Math.round(sumConf / n * 100);

  return `<div class="kpi-grid">
    <div class="kpi-card kpi-neutral"><div class="kpi-bar blue"></div><div class="kpi-label">Appels traités</div><div class="kpi-value">${n}</div><div class="kpi-sub">${Math.round(sumDur/60)} min de conversation</div></div>
    <div class="kpi-card kpi-blue"><div class="kpi-bar blue"></div><div class="kpi-label">Note moyenne</div><div class="kpi-value">${avg}<span class="unit">%</span></div><div class="kpi-sub">${calls.filter(c=>(c.score||0)>=75).length} appels ≥ 75%</div></div>
    <div class="kpi-card kpi-green"><div class="kpi-bar green"></div><div class="kpi-label">Conformité</div><div class="kpi-value">${conformite}<span class="unit">%</span></div><div class="kpi-sub">${sumConf}/${n} appels conformes</div></div>
    <div class="kpi-card kpi-purple"><div class="kpi-bar purple"></div><div class="kpi-label">Agents évalués</div><div class="kpi-value">${ag.size}</div><div class="kpi-sub">sur la période</div></div>
    <div class="kpi-card kpi-red"><div class="kpi-bar red"></div><div class="kpi-label">Satisfaction client</div><div class="kpi-value">${sat}<span class="unit">%</span></div><div class="kpi-sub">Friction : ${fric}%</div></div>
  </div>`;
}

// ---- Charts ----
function buildCharts(calls) {
  if (!calls.length) return '';
  return `<div class="charts-grid">
    <div class="chart-card" style="grid-column:1/-1"><h3>Évolution des notes</h3><div class="chart-wrap"><canvas id="chEvo" height="120"></canvas></div></div>
    <div class="chart-card"><h3>Distribution des notes</h3><div class="chart-wrap"><canvas id="chDist" height="160"></canvas></div></div>
    <div class="chart-card"><h3>Top 5 agents · Note moyenne</h3><div class="chart-wrap"><canvas id="chTop" height="160"></canvas></div></div>
    <div class="chart-card"><h3>Répartition par grade</h3><div class="chart-wrap"><canvas id="chGrade" height="160"></canvas></div></div>
  </div>`;
}

function initCharts(calls) {
  Object.values(CHARTS).forEach(c => { try { c.destroy(); } catch(e) {} });
  CHARTS = {};
  if (!calls.length) return;

  // Evolution line chart (scores over time)
  const sorted = [...calls].sort((a,b) => (a.datetime||a.date||'').localeCompare(b.datetime||b.date||''));
  const evoData = sorted.map(c => ({ x: (c.datetime||c.date||'').slice(0,10), y: c.score || 0 }));
  // Group by day for cleaner chart
  const dayMap = {};
  evoData.forEach(d => { if (!dayMap[d.x]) dayMap[d.x] = []; dayMap[d.x].push(d.y); });
  const evoDays = Object.entries(dayMap).sort((a,b) => a[0].localeCompare(b[0]));
  const evoLabels = evoDays.map(([d]) => d.slice(5)); // MM-DD
  const evoAvgs = evoDays.map(([,vals]) => Math.round(vals.reduce((a,b)=>a+b,0)/vals.length));
  const evoCounts = evoDays.map(([,vals]) => vals.length);
  const c0 = document.getElementById('chEvo');
  if (c0) CHARTS.evo = new Chart(c0, {
    type: 'line',
    data: {
      labels: evoLabels,
      datasets: [
        { label: 'Note moyenne', data: evoAvgs, borderColor: '#0071e3', backgroundColor: 'rgba(0,113,227,0.08)', fill: true, tension: 0.4, pointRadius: 3, pointBackgroundColor: '#0071e3', borderWidth: 2 },
        { label: 'Appels', data: evoCounts, borderColor: '#86868b', backgroundColor: 'rgba(134,134,139,0.05)', borderDash: [4,3], tension: 0.3, pointRadius: 2, yAxisID: 'y1', borderWidth: 1 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: true, aspectRatio: 4,
      plugins: {
        legend: { position: 'top', labels: { font: { size: 10, family: 'Inter' }, color: '#6e6e73', boxWidth: 12, padding: 8 } },
        tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + (ctx.dataset.label === 'Appels' ? ctx.parsed.y : ctx.parsed.y + '%') } }
      },
      scales: {
        y: { min: 0, max: 100, ticks: { font: { size: 9, family: 'Inter' }, color: '#86868b', callback: v => v + '%' }, grid: { color: 'rgba(0,0,0,0.04)' }, title: { display: true, text: 'Note %', font: { size: 9, family: 'Inter' }, color: '#86868b' } },
        y1: { position: 'right', min: 0, ticks: { font: { size: 9, family: 'Inter' }, color: '#86868b' }, grid: { display: false }, title: { display: true, text: 'Volume', font: { size: 9, family: 'Inter' }, color: '#86868b' } },
        x: { ticks: { font: { size: 9, family: 'Inter' }, color: '#86868b', maxTicksLimit: 12 }, grid: { display: false } }
      }
    }
  });

  // Distribution histogram (buckets: 0-30%, 30-55%, 55-75%, 75-90%, 90-100%)
  const bins = {'0-30%':0,'30-55%':0,'55-75%':0,'75-90%':0,'90-100%':0};
  calls.forEach(c => {
    const s = c.score || 0;
    if (s < 30) bins['0-30%']++;
    else if (s < 55) bins['30-55%']++;
    else if (s < 75) bins['55-75%']++;
    else if (s < 90) bins['75-90%']++;
    else bins['90-100%']++;
  });
  const c1 = document.getElementById('chDist');
  if (c1) CHARTS.dist = new Chart(c1, {
    type: 'bar',
    data: {
      labels: Object.keys(bins),
      datasets: [{ label: 'Appels', data: Object.values(bins), backgroundColor: ['#ff453a','#ff9f0a','#ffd60a','#64d2ff','#30d158'], borderRadius: 4, borderSkipped: false }]
    },
    options: {
      responsive: true, maintainAspectRatio: true, aspectRatio: 2.4,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10, family: 'Inter' }, color: '#86868b' }, grid: { color: 'rgba(0,0,0,0.04)' } },
        x: { ticks: { font: { size: 10, family: 'Inter' }, color: '#86868b' }, grid: { display: false } }
      }
    }
  });

  // Top 5 agents
  const grp = {};
  calls.forEach(c => { const k=c.agent_name||'?'; if (!grp[k]) grp[k]=[]; grp[k].push(c); });
  const top = Object.entries(grp).map(([n,ll]) => ({n, avg: ll.reduce((s,c)=>s+(c.score||0),0)/ll.length})).sort((a,b)=>b.avg-a.avg).slice(0,5);
  const c2 = document.getElementById('chTop');
  if (c2) CHARTS.top = new Chart(c2, {
    type: 'bar',
    data: {
      labels: top.map(t => t.n.split(' ').slice(0,2).join(' ')),
      datasets: [{ label: 'Note %', data: top.map(t => t.avg), backgroundColor: '#0071e3', borderRadius: 4, borderSkipped: false }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: true, aspectRatio: 2.4,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.parsed.x + '%' } } },
      scales: {
        x: { min: 0, max: 100, ticks: { font: { size: 10, family: 'Inter' }, color: '#86868b' }, grid: { color: 'rgba(0,0,0,0.04)' } },
        y: { ticks: { font: { size: 10, family: 'Inter' }, color: '#86868b' }, grid: { display: false } }
      }
    }
  });

  // Grade distribution (pie)
  let gA=0, gB=0, gC=0;
  calls.forEach(c => {
    const gl = c.grade_label || '';
    if (gl === 'Conforme') gA++;
    else if (gl === 'À améliorer' || gl === 'À améliorer') gB++;
    else gC++;
  });
  const c3 = document.getElementById('chGrade');
  if (c3 && (gA+gB+gC) > 0) CHARTS.grade = new Chart(c3, {
    type: 'doughnut',
    data: {
      labels: ['Conforme', 'À améliorer', 'Non conforme'],
      datasets: [{ data: [gA, gB, gC], backgroundColor: ['#30d158', '#ff9f0a', '#ff453a'], borderWidth: 2, borderColor: '#fff' }]
    },
    options: {
      responsive: true, maintainAspectRatio: true, aspectRatio: 1.6,
      plugins: {
        legend: { position: 'right', labels: { font: { size: 10, family: 'Inter' }, color: '#6e6e73', padding: 8 } }
      },
      cutout: '60%'
    }
  });
}

// ---- Table ----
function buildTable(calls) {
  if (!calls.length) return '';
  const grp = {};
  calls.forEach(c => { const k=c.agent_name||'?'; if (!grp[k]) grp[k]=[]; grp[k].push(c); });
  const rows = Object.entries(grp).map(([name,list]) => {
    const n = list.length;
    const avg = list.reduce((s,c) => s+(c.score||0),0) / n;
    let su=0, sn=0, sf=0;
    list.forEach(c => { const s=c.client_sentiment; if(s){su+=s.Satisfied||0;sn+=s.Neutral||0;sf+=s.Frustrated||0;} });
    const letter = avg >= 75 ? 'A' : avg >= 55 ? 'B' : 'C';
    const enc = btoa(encodeURIComponent(JSON.stringify(list)));
    return {name, n, avg: avg.toFixed(1), letter, su: Math.round(su/n), sn: Math.round(sn/n), sf: Math.round(sf/n), enc};
  }).sort((a,b) => b.n - a.n || +b.avg - +a.avg);

  return `<div class="table-card">
    <div class="table-header"><h3>Conseillers</h3><span class="count">${rows.length} agents · ${calls.length} appels</span></div>
    <div class="table-scroll">
    <table><thead><tr><th>Conseiller</th><th>Appels</th><th>Note</th><th>Grade</th><th>Sentiment</th></tr></thead>
    <tbody>${rows.map(r => `<tr>
      <td><button class="agent-link" onclick="openModal('${r.enc}')">${esc(r.name)}</button></td>
      <td><strong>${r.n}</strong></td>
      <td style="font-weight:700;font-size:14px">${r.avg}<span style="font-weight:400;font-size:10px;color:var(--text-tertiary)">%</span></td>
      <td><span class="grade-badge grade-${r.letter}">${r.letter === 'A' ? 'Conforme' : r.letter === 'B' ? 'À améliorer' : 'Non conforme'}</span></td>
      <td><div class="sentiment-bar"><div style="background:var(--green-dim);width:${r.su}%"></div><div style="background:var(--orange);width:${r.sn}%"></div><div style="background:var(--red-dim);width:${r.sf}%"></div></div></td>
    </tr>`).join('')}</tbody></table></div></div>`;
}

// ---- Modal with Grille Details ----
function openModal(enc) {
  const calls = JSON.parse(decodeURIComponent(atob(enc)));
  if (!calls || !calls.length) return;
  const c0 = calls[0];
  const evalData = c0.evaluation || {};

  document.getElementById('modalName').textContent = c0.agent_name || 'Agent';
  document.getElementById('modalMeta').textContent = 'Service : '+(c0.service||'—')+' · Manager : '+(c0.manager||'—');

  let sum = 0, su = 0, sf = 0, gConforme=0, gAmeliorer=0, gNonConf=0;
  calls.forEach(c => {
    sum += c.score || 0;
    const s = c.client_sentiment;
    if (s) { su += s.Satisfied||0; sf += s.Frustrated||0; }
    if (c.grade_label === 'Conforme') gConforme++;
    else if (c.grade_label === 'À améliorer' || c.grade_label === 'À améliorer') gAmeliorer++;
    else gNonConf++;
  });
  const n = calls.length;
  const avg = (sum / n).toFixed(1);
  const sat = Math.round(su / n);
  const fric = Math.round(sf / n);
  const letter = avg >= 75 ? 'A' : avg >= 55 ? 'B' : 'C';

  // Get criteria from first call with eval data
  const criteria = evalData.criteria || [];
  const breakdown = evalData.category_breakdown || {};

  // Build grille sections
  let grilleHTML = '';
  if (criteria.length) {
    // Group by category
    const cats = {};
    criteria.forEach(cr => {
      const cat = cr.category || 'Autre';
      if (!cats[cat]) cats[cat] = [];
      cats[cat].push(cr);
    });

    grilleHTML = Object.entries(cats).map(([cat, crits]) => {
      const bd = breakdown[cat] || {};
      const bdPct = bd.pct !== undefined ? bd.pct + '%' : '—';
      const bdPts = bd.earned !== undefined ? bd.earned + '/' + bd.possible + ' pts' : '';
      return `<div class="grille-section">
        <h4>${esc(cat)} ${bdPts ? '· ' + bdPts + ' (' + bdPct + ')' : ''}</h4>
        ${crits.map(cr => {
          const lvl = cr.level || 'N/A';
          const cls = lvl === 'Conforme' ? 'conforme' : 
            (lvl === 'À améliorer' || lvl === 'À améliorer') ? 'ameliorer' :
            lvl === 'Non conforme' ? 'non-conforme' : 'na';
          const lvlCls = lvl === 'Conforme' ? 'gl-conforme' :
            (lvl === 'À améliorer' || lvl === 'À améliorer') ? 'gl-ameliorer' :
            lvl === 'Non conforme' ? 'gl-nonconforme' : 'gl-na';
          const pct = cr.pct !== null && cr.pct !== undefined ? cr.pct + '%' : '—';
          const pts = cr.points !== undefined && cr.max_points ? cr.points + '/' + cr.max_points : '';
          return `<div class="grille-row ${cls}">
            <span class="grille-label">${esc(cr.label)}</span>
            <span class="grille-level ${lvlCls}">${esc(lvl)}</span>
            <span class="grille-points">${pts}</span>
            <span class="grille-pct">${pct}</span>
          </div>`;
        }).join('')}
      </div>`;
    }).join('');
  } else {
    grilleHTML = '<p style="color:var(--text-tertiary);font-size:12px;">Évaluation détaillée non disponible pour cet appel.</p>';
  }

  // Build pros/cons/amelioration
  const allPros = calls.flatMap(c => Array.isArray(c.pros) ? c.pros : []);
  const allCons = calls.flatMap(c => Array.isArray(c.cons) ? c.cons : []);
  const allAmelio = calls.flatMap(c => Array.isArray(c.a_ameliorer) ? c.a_ameliorer : []);

  document.getElementById('modalBody').innerHTML = `
    <div class="agent-stats">
      <div class="stat-pill"><div class="num grade-${letter}">${avg}%</div><div class="lbl">Note moyenne</div></div>
      <div class="stat-pill"><div class="num" style="color:var(--green-dim)">${sat}%</div><div class="lbl">Satisfaction</div></div>
      <div class="stat-pill"><div class="num" style="color:var(--red-dim)">${fric}%</div><div class="lbl">Friction</div></div>
      <div class="stat-pill"><div class="num" style="color:var(--blue)">${n}</div><div class="lbl">Appels</div></div>
    </div>

    <div class="breakdown-bar">
      <div class="seg-conforme" style="width:${(gConforme/n*100)||0}%" title="Conforme: ${gConforme}"></div>
      <div class="seg-ameliorer" style="width:${(gAmeliorer/n*100)||0}%" title="À améliorer: ${gAmeliorer}"></div>
      <div class="seg-nonconforme" style="width:${(gNonConf/n*100)||0}%" title="Non conforme: ${gNonConf}"></div>
    </div>

    ${grilleHTML}

    <div class="notes-section">
      <div class="notes-box notes-pro">
        <h5>Points forts</h5>
        <ul>${allPros.length ? allPros.slice(0,5).map(p => '<li>'+esc(p)+'</li>').join('') : '<li style="color:var(--text-tertiary)">Aucun point fort majeur</li>'}</ul>
      </div>
      <div class="notes-box notes-con">
        <h5>Points faibles</h5>
        <ul>${allCons.length ? allCons.slice(0,3).map(c => '<li>'+esc(c)+'</li>').join('') : '<li style="color:var(--text-tertiary)">Aucun écart significatif</li>'}</ul>
      </div>
      <div class="notes-box notes-amelio">
        <h5>À améliorer</h5>
        <ul>${allAmelio.length ? allAmelio.slice(0,5).map(a => '<li>'+esc(a)+'</li>').join('') : '<li style="color:var(--text-tertiary)">Continuer sur cette lancée</li>'}</ul>
      </div>
    </div>

    <h4 style="font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;">Appels récents (${Math.min(n,20)}/${n})</h4>
    <div class="call-timeline">${calls.sort((a,b)=>(b.datetime||b.date||'').localeCompare(a.datetime||a.date||'')).slice(0,20).map(c => {
      const sc = c.score || 0;
      const l = sc >= 75 ? 'A' : sc >= 55 ? 'B' : 'C';
      const dt = ((c.datetime||c.date||'').slice(0,16).replace('T',' '));
      const dur = c.duration_sec ? Math.round(c.duration_sec/60)+'min' : '—';
      const s = c.client_sentiment || {};
      const prosArr = Array.isArray(c.pros) ? c.pros.slice(0,1) : [];
      const consArr = Array.isArray(c.cons) ? c.cons.slice(0,1) : [];
      const link = c.url && c.url !== '#' ? ' · <a href="'+esc(c.url)+'" target="_blank" style="color:var(--blue);text-decoration:none;font-weight:500;">Genesys ↗</a>' : '';
      return `<div class="call-entry">
        <div class="call-entry-top">
          <span class="call-entry-date">${esc(dt)} · ${dur}${link}</span>
          <span class="call-entry-grade grade-${l}">${sc.toFixed(1)}%</span>
        </div>
        <div class="call-entry-detail">
          <span style="color:var(--green-dim)">${s.Satisfied||0}%</span>
          <span style="color:var(--orange)">${s.Neutral||0}%</span>
          <span style="color:var(--red-dim)">${s.Frustrated||0}%</span>
          ${prosArr.length ? ' · <span style="color:#248a3d">'+esc(prosArr[0])+'</span>' : ''}
          ${consArr.length ? ' · <span style="color:#bf2a1f">'+esc(consArr[0])+'</span>' : ''}
        </div>
      </div>`;
    }).join('')}</div>
    ${n>20 ? '<p style="text-align:center;font-size:11px;color:var(--text-tertiary);margin-top:10px;">Affichage des 20 derniers appels sur '+n+'</p>' : ''}`;

  document.getElementById('modal').classList.add('active');
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }

function esc(s) { return typeof s==='string' ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : (s||''); }

// ============================================================
// AUTHENTICATION SYSTEM — Per-user passphrases (no email needed)
// ============================================================
// GitHub variable LOGIN_PASSPHRASE is a JSON map:
//   {"user@bymycar.fr": "motdepasse", "autre@bymycar.fr": "secret"}
// Injected by pipeline at build time. Session in localStorage (2h).

// The pipeline replaces {"john.melek@bymycar.fr":"bymycar2026"} with a raw JSON object:
// {"user@bymycar.fr":"password"}
// We use typeof-trick so it works even if placeholder wasn't replaced.
const ALLOWED_DOMAINS = ['bymycar', 'cosmobilis'];
const SESSION_DURATION_MS = 2 * 60 * 60 * 1000; // 2 heures

// This gets replaced at build time by the pipeline.
// DO NOT put quotes around {"john.melek@bymycar.fr":"bymycar2026"} — it's replaced with a raw JSON object literal.
const RAW_USERS = (typeof {"john.melek@bymycar.fr":"bymycar2026"} !== 'undefined') ? {"john.melek@bymycar.fr":"bymycar2026"} : null;

let _users = null;
function getUsers() {
  if (_users) return _users;
  if (RAW_USERS && typeof RAW_USERS === 'object' && !Array.isArray(RAW_USERS)) {
    _users = RAW_USERS;
  }
  return _users;
}

function togglePassphraseVisibility() {
  const input = document.getElementById('loginPassphrase');
  const btn = document.getElementById('togglePassphrase');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}

function showLogin() {
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginEmail').focus();
  document.getElementById('loginPassphrase').value = '';
  document.getElementById('loginError').textContent = '';
}

function hideLogin() {
  document.getElementById('loginScreen').classList.add('hidden');
}

function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const passphrase = document.getElementById('loginPassphrase').value;
  const errorEl = document.getElementById('loginError');
  errorEl.textContent = '';

  const users = getUsers();

  // Vérifier la configuration
  if (!users || typeof users !== 'object') {
    if (typeof USER_PASSWORDS === 'string' && USER_PASSWORDS.startsWith('__')) {
      errorEl.textContent = 'Erreur de configuration : contactez l\'administrateur.';
    } else {
      errorEl.textContent = 'Erreur de configuration : format de passphrase invalide.';
    }
    return;
  }

  // Valider email
  if (!email || !email.includes('@')) {
    errorEl.textContent = 'Veuillez entrer une adresse email valide.';
    return;
  }

  const domain = email.split('@')[1] || '';
  const domainName = domain.split('.')[0].toLowerCase();
  const allowed = ALLOWED_DOMAINS.some(d => domainName === d || domainName.endsWith('.' + d));
  if (!allowed) {
    errorEl.textContent = 'Seuls les emails @bymycar.* et @cosmobilis.* sont autorisés.';
    return;
  }

  // Vérifier si l'email a un compte
  if (!(email in users)) {
    errorEl.textContent = 'Accès non autorisé. Cet email n\'a pas de compte.';
    return;
  }

  // Valider mot de passe
  if (!passphrase) {
    errorEl.textContent = 'Veuillez saisir votre mot de passe.';
    return;
  }

  if (passphrase !== users[email]) {
    errorEl.textContent = 'Mot de passe incorrect. Veuillez réessayer.';
    document.getElementById('loginPassphrase').value = '';
    document.getElementById('loginPassphrase').focus();
    return;
  }

  // Succès
  completeLogin(email);
}

function completeLogin(email) {
  const session = {
    email: email,
    loginTime: Date.now(),
    expiryTime: Date.now() + SESSION_DURATION_MS
  };
  localStorage.setItem('bdc_session', JSON.stringify(session));

  document.getElementById('userBadge').innerHTML = email + ' · <span style="cursor:pointer;color:var(--red-dim)" onclick="logout()">Déconnexion</span>';
  document.getElementById('loginError').innerHTML = '<span style="color:var(--green-dim)">Connecté en tant que ' + email + '</span>';
  
  setTimeout(() => hideLogin(), 500);
}

function checkSession() {
  try {
    const raw = localStorage.getItem('bdc_session');
    if (!raw) return false;
    const session = JSON.parse(raw);
    if (!session || !session.email || !session.expiryTime) {
      localStorage.removeItem('bdc_session');
      return false;
    }
    if (Date.now() > session.expiryTime) {
      localStorage.removeItem('bdc_session');
      return false;
    }
    // Session valide — afficher le badge
    document.getElementById('userBadge').innerHTML = session.email + ' · <span style="cursor:pointer;color:var(--red-dim)" onclick="logout()">Déconnexion</span>';
    return true;
  } catch (e) {
    localStorage.removeItem('bdc_session');
    return false;
  }
}

function logout() {
  localStorage.removeItem('bdc_session');
  document.getElementById('userBadge').textContent = 'Non connecté';
  showLogin();
}

// Intercepter Entrée
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('loginBtn').onclick = handleLogin;
  document.getElementById('loginPassphrase').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
  });
  document.getElementById('loginEmail').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('loginPassphrase').focus();
  });

  const hasSession = checkSession();
  if (!hasSession) {
    showLogin();
  } else {
    hideLogin();
  }
});
</script>
</body>
</html>
